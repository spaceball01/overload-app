  const suggestion = getSuggestedWeight(exId);
  const last = history.length ? history[history.length-1] : null;
  const best = history.length ? Math.max(...history.map(h=>h.volume)) : 0;
  const prSet = getAllPRKeys();

  const stats = `
    <div class="stat-strip">
      <div class="stat-chip"><div class="sv">${last ? last.weight : "—"}</div><div class="sl">Last Weight</div></div>
      <div class="stat-chip"><div class="sv">${suggestion ? suggestion.weight : "—"}</div><div class="sl">Next Target</div></div>
      <div class="stat-chip"><div class="sv">${best.toLocaleString()}</div><div class="sl">Best Volume</div></div>
    </div>
  `;

  const chart = history.length
    ? renderChart(history, "volume")
    : `<div class="empty-state" style="margin:8px;">Log this exercise to start seeing your progression chart here.</div>`;

  const oneRMChart = history.length
    ? renderChart(history, "oneRM")
    : `<div class="empty-state" style="margin:8px;">Log this exercise to start seeing your 1RM chart here.</div>`;

  let pointDetail = "";
  if(selectedPoint !== null && history[selectedPoint]){
    const p = history[selectedPoint];
    const isPR = prSet.has(`${p.wId}::${exId}`);
    const setsLine = p.sets.map((s,i)=>`Set ${i+1}: ${s.weight} lbs × ${s.reps}`).join("<br>");
    const warmupNote = p.warmups.length ? `<br>${p.warmups.length} warm-up set${p.warmups.length>1?"s":""} (not counted)` : "";
    pointDetail = `
      <div class="point-detail">
        <b>${fmtDateFull(p.date)}</b>${isPR ? ` <span class="pr-star-inline">${ICONS.star}</span><b>Personal Record</b>` : ""}<br>
        ${setsLine}${warmupNote}<br>
        <b>${p.volume.toLocaleString()} lbs</b> total volume · Estimated 1RM: <b>${Math.round(p.oneRM).toLocaleString()} lbs</b><br>
        ${STATUS_LABEL[p.status].text}
      </div>`;
  }

  let rows = "";
  [...history].reverse().forEach((h)=>{
    const color = h.status === "green" ? "var(--green)" : h.status === "orange" ? "var(--orange)" : "var(--red)";
    const isPR = prSet.has(`${h.wId}::${exId}`);
    const setsStr = h.sets.map(s=>`${s.weight}×${s.reps}`).join(", ");
    rows += `
      <div class="hrow">
        <div class="hdot" style="background:${color}"></div>
        <div class="hdate">${fmtDate(h.date)}</div>
        <div class="hreps">${isPR ? `<span class="pr-star-inline">${ICONS.star}</span>` : ""}${setsStr}</div>
        <div class="hvol">${h.volume.toLocaleString()}</div>
      </div>`;
  });

  return `
    <div class="bar-top">
      <div class="back-btn" onclick="selectedPoint=null; nav(detailBackTarget)">${ICONS.back}</div>
      <div class="bar-title">${ex.name}</div>
    </div>
    ${stats}
    <div class="chart-card">
      <div class="chart-title">Volume per Session</div>
      <div class="chart-legend">
        <span><i style="background:var(--green)"></i>Increase</span>
        <span><i style="background:var(--orange)"></i>Maintain</span>
        <span><i style="background:var(--red)"></i>Decrease</span>
      </div>
      ${chart}
    </div>
    <div class="chart-card" style="margin-top:14px;">
      <div class="chart-title">Estimated 1-Rep Max <span class="chart-subtle">(Brzycki · first set)</span></div>
      ${oneRMChart}
    </div>
    ${pointDetail ? `<div style="margin-top:12px;">${pointDetail}</div>` : ""}
    <div class="history-table">
      <div class="section-label">History</div>
      ${rows || ""}
    </div>
  `;
}

function renderChart(history, valueKey){
  const W = 320, H = 190;
  const padL = 34, padR = 14, padT = 14, padB = 26;
  const chartW = W - padL - padR, chartH = H - padT - padB;
  const n = history.length;
  const maxVal = Math.max(...history.map(h=>h[valueKey])) * 1.15 || 1;

  const xFor = i => n <= 1 ? padL + chartW/2 : padL + (i/(n-1)) * chartW;
  const yFor = v => padT + chartH - (v/maxVal) * chartH;

  const colorFor = s => s==="green" ? "var(--green)" : s==="orange" ? "var(--orange)" : "var(--red)";

  let path = "";
  history.forEach((h,i)=>{
    const x = xFor(i), y = yFor(h[valueKey]);
    path += (i===0 ? `M${x},${y}` : ` L${x},${y}`);
  });

  // y-axis gridlines (3)
  let grid = "";
  for(let g=0; g<=2; g++){
    const y = padT + (chartH/2)*g;
    const val = Math.round(maxVal - (maxVal/2)*g);
    grid += `<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="var(--border-soft)" stroke-width="1"/>`;
    grid += `<text x="${padL-6}" y="${y+3}" text-anchor="end" font-size="8.5" fill="var(--text-faint)" font-family="var(--font-mono)">${val>=1000?(val/1000).toFixed(1)+'k':val}</text>`;
  }

  let dots = "";
  history.forEach((h,i)=>{
    const x = xFor(i), y = yFor(h[valueKey]);
    const c = colorFor(h.status);
    dots += `
      <circle cx="${x}" cy="${y}" r="9" fill="${c}" fill-opacity="0.18" />
      <circle cx="${x}" cy="${y}" r="5.5" fill="${c}" stroke="var(--bg-card)" stroke-width="1.5"
        onclick="selectedPoint=${i}; render();" style="cursor:pointer;" />
    `;
    if(n <= 8 || i===0 || i===n-1 || i%Math.ceil(n/8)===0){
      dots += `<text x="${x}" y="${H-8}" text-anchor="middle" font-size="8.5" fill="var(--text-faint)" font-family="var(--font-mono)">${i+1}</text>`;
    }
  });

  return `
    <svg viewBox="0 0 ${W} ${H}" style="width:100%; height:auto; display:block;">
      ${grid}
      <path d="${path}" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" opacity="0.9"/>
      ${dots}
    </svg>
  `;
}

/* ============ MANAGE ============ */
function viewManage(){
  const list = getExercises();
  let blocks = "";
  list.forEach(ex=>{
    blocks += `
      <div class="ex-row" style="cursor:default;">
        <div>
          <div class="en">${ex.name}</div>
          <div class="es">±${ex.increment} lbs increment</div>
        </div>
        <div style="display:flex; align-items:center; gap:4px; flex-shrink:0;">
          <button class="icon-btn" onclick="openRenameModal('${ex.id}')" aria-label="Rename exercise">${ICONS.edit}</button>
          <button class="pick-del" onclick="removeExercise('${ex.id}')">Delete</button>
        </div>
      </div>`;
  });
  if(!list.length) blocks = `<div class="empty-state" style="margin:0 20px;">No exercises yet. Add your first one below.</div>`;
  blocks += `
    <div class="manage-add">
      <input id="add-exercise-input" placeholder="New exercise name" style="flex:1; background:var(--bg-card); border:1px solid var(--border); border-radius:10px; color:var(--text); padding:12px 14px; font-size:13.5px;">
      <button class="pick-del" style="color:var(--accent-hi); background:var(--bg-card); border:1px solid var(--border); border-radius:10px;" onclick="addFromManage()">Add</button>
    </div>
  `;
  return `
    <div class="top" style="padding-bottom:4px;">
      <div class="page-title">Exercises</div>
    </div>
    <div class="section-label" style="padding:0 20px; margin-top:14px;">Backup &amp; restore</div>
    <div style="margin:0 20px 4px;">
      <div class="backup-status">${BACKUP_META.lastExportAt ? `Last backup: ${fmtDate(BACKUP_META.lastExportAt)}` : "You haven't backed up yet"}</div>
      <div class="backup-row" onclick="exportData()">
        ${ICONS.download}
        <div>
          <div class="backup-title">Export Backup File</div>
          <div class="backup-sub">Save all your exercises and workout history to a file</div>
        </div>
      </div>
      <label class="backup-row" style="cursor:pointer;">
        ${ICONS.upload}
        <div>
          <div class="backup-title">Import Backup File</div>
          <div class="backup-sub">Restore data from a previously exported file</div>
        </div>
        <input type="file" accept="application/json,.json" style="display:none" onchange="importDataFile(this)">
      </label>
    </div>
    <div class="section-label" style="padding:0 20px; margin-top:22px;">Manage your exercise library</div>
    ${blocks}
  `;
}
function removeExercise(id){
  showConfirmDialog("Delete this exercise? Past history stays saved but it will leave the picker.", ()=>{
    deleteExercise(id);
    render();
  });
}
function escapeHtml(str){
  return String(str).replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
function openRenameModal(id){
  const ex = DATA.exercises.find(e=>e.id===id);
  if(!ex) return;
  const modal = document.getElementById("modal-root");
  modal.innerHTML = `
    <div class="sheet-backdrop" onclick="if(event.target===this) closeModal()">
      <div class="sheet">
        <div class="sheet-handle"></div>
        <div class="sheet-title">Rename Exercise</div>
        <div class="new-ex-form" style="margin-top:0;">
          <input id="renameInput" value="${escapeHtml(ex.name)}" placeholder="Exercise name">
          <button onclick="saveRenameExercise('${id}')">Save</button>
        </div>
        <div class="plan-hint" style="text-align:left; margin-top:12px;">This updates the name everywhere, including past logged sessions for this exercise.</div>
      </div>
    </div>
  `;
  pushModalState();
  const input = document.getElementById("renameInput");
  if(input){ input.focus(); input.select(); }
}
function saveRenameExercise(id){
  const input = document.getElementById("renameInput");
  const name = input.value.trim();
  if(!name) return;
  renameExercise(id, name);
  closeModal();
  showToast("Exercise renamed");
  render();
}
function renameExercise(id, newName){
  const ex = DATA.exercises.find(e=>e.id===id);
  if(ex) ex.name = newName;
  DATA.workouts.forEach(w=>{
    w.entries.forEach(e=>{ if(e.exId === id) e.name = newName; });
  });
  saveData(DATA);
}
function addFromManage(){
  const input = document.getElementById("add-exercise-input");
  const name = input.value.trim();
  if(!name) return;
  addExercise(name, 5);
  render();
}

function exportData(){
  const blob = new Blob([JSON.stringify(DATA, null, 2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `overload-backup-${todayStr()}.json`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
  recordBackupDone();
  showToast("Backup file downloaded");
  render();
}
function importDataFile(input){
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (e)=>{
    let parsed;
    try{
      parsed = JSON.parse(e.target.result);
    }catch(err){
      alert("That file doesn't look like a valid Overload backup.");
      return;
    }
    if(!parsed || typeof parsed !== "object" || !parsed.exercises || !parsed.workouts){
      alert("That file doesn't look like a valid Overload backup.");
      return;
    }
    if(!confirm("Import this backup? This will replace all exercises and workout history currently in this app.")) return;
    DATA = migrateExerciseData(parsed);
    saveData(DATA);
    recordBackupDone();
    showToast("Data imported");
    nav({name:"home"});
  };
  reader.readAsText(file);
  input.value = "";
}


/* ============ NAV / TOAST ============ */
function viewBottomNav(showResumeBar){
  const active = (route.name === "log" || route.name === "session" || route.name === "day" || route.name === "templateEdit" || route.name === "startWorkout") ? "home" : (route.name === "detail" ? "progress" : route.name);
  const resumeBar = showResumeBar ? `
    <div class="active-session-bar" onclick="nav({name:'log'})">
      <div class="active-session-dot"></div>
      <div class="active-session-main">
        <div class="active-session-title">${templateLabel(sessionType)} workout in progress</div>
        <div class="active-session-sub">${sessionPausedAt ? "Paused — tap to resume" : "Tap to resume"}</div>
      </div>
      <div class="active-session-timer" id="activeSessionBarTimer">0:00</div>
    </div>
  ` : "";
  return `
    <div class="bottom-nav">
      ${resumeBar}
      <div class="bottom-nav-inner">
        <button class="nav-btn ${active==='home'?'active':''}" onclick="nav({name:'home'})">${ICONS.home}Home</button>
        <button class="nav-btn ${active==='progress'?'active':''}" onclick="selectedPoint=null; nav({name:'progress'})">${ICONS.chart}Progress</button>
        <button class="nav-btn ${active==='manage'?'active':''}" onclick="nav({name:'manage'})">${ICONS.list}Exercises</button>
      </div>
    </div>
  `;
}
function showToast(msg){
  const t = document.createElement("div");
  t.className = "toast";
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>{
    t.classList.add("toast-out");
    setTimeout(()=> t.remove(), 220);
  }, 2000);
}

function afterRender(){
  if(sessionStartTime && !isFuturePlan()){
    updateTimerDisplay();
    if(!sessionPausedAt){
      startSessionTimer();
    }else{
      stopSessionTimer();
    }
  }else{
    stopSessionTimer();
  }
  if(stretchPhase === "running" && !isFuturePlan()){
    startStretchTimer();
  }else{
    stopStretchTimer();
  }
}

/* ============ WORKOUT TIMER ============
   Runs whenever a session is active, regardless of which tab is open, so the
   elapsed time keeps counting in the background and stays accurate whichever
   view (header timer or the resume bar) happens to be on screen. */
function startSessionTimer(){
  stopSessionTimer();
  updateTimerDisplay();
  sessionTimerInterval = setInterval(updateTimerDisplay, 1000);
}
function stopSessionTimer(){
  if(sessionTimerInterval){ clearInterval(sessionTimerInterval); sessionTimerInterval = null; }
}
function updateTimerDisplay(){
  if(!sessionStartTime) return;
  const now = sessionPausedAt || Date.now();
  const text = fmtDuration(Math.floor((now - sessionStartTime)/1000));
  const headerEl = document.getElementById("workoutTimer");
  if(headerEl) headerEl.textContent = text;
  const barEl = document.getElementById("activeSessionBarTimer");
  if(barEl) barEl.textContent = text;
}
function fmtDuration(totalSeconds){
  totalSeconds = Math.max(0, totalSeconds);
  const h = Math.floor(totalSeconds/3600);
  const m = Math.floor((totalSeconds%3600)/60);
  const s = totalSeconds%60;
  if(h>0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${m}:${String(s).padStart(2,'0')}`;
}

/* ============ SERVICE WORKER ============ */
if("serviceWorker" in navigator){
  window.addEventListener("load", ()=>{
    navigator.serviceWorker.register("service-worker.js").catch(()=>{});
  });
}

restoreActiveSessionIfAny();
history.replaceState({route}, "", "");
window.addEventListener("popstate", (e)=>{
  const modalRoot = document.getElementById("modal-root");
  if(modalRoot && modalRoot.innerHTML.trim() !== ""){
    // Back closes an open sheet/dialog first, rather than leaving the page behind it.
    modalRoot.innerHTML = "";
    modalHistoryPushed = false;
    return;
  }
  route = (e.state && e.state.route) || {name:"home"};
  render();
});
render();
</script>
