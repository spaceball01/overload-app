<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#16181C">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Overload — Lift Tracker</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
:root{
  --bg:#16181C;
  --bg-elev:#1C1F26;
  --bg-card:#21242C;
  --bg-card-2:#282C35;
  --border:rgba(255,255,255,0.08);
  --border-soft:rgba(255,255,255,0.05);
  --text:#F2EFE6;
  --text-dim:#9BA0AA;
  --text-faint:#5E636C;
  --accent:#C9A227;
  --accent-hi:#E4BC3E;
  --accent-soft:rgba(201,162,39,0.14);
  --green:#3FB67F;
  --green-soft:rgba(63,182,127,0.16);
  --orange:#E8A33D;
  --orange-soft:rgba(232,163,61,0.16);
  --red:#E5484D;
  --red-soft:rgba(229,72,77,0.16);
  --radius-lg:22px;
  --radius-md:16px;
  --radius-sm:10px;
  --font-display:'Arial Narrow',"Roboto Condensed","Oswald",system-ui,sans-serif;
  --font-body:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --font-mono:ui-monospace,"SF Mono",Consolas,"Roboto Mono",monospace;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:var(--font-body);
  overscroll-behavior-y:none;
  -webkit-font-smoothing:antialiased;
}
#app{
  max-width:520px;
  margin:0 auto;
  min-height:100vh;
  padding-bottom:96px;
  position:relative;
  background:
    radial-gradient(circle at 15% 0%, rgba(201,162,39,0.07), transparent 40%),
    var(--bg);
}

/* ============ MOTION SYSTEM ============
   Shared press-feedback + entrance animations so taps and screen changes
   feel eased rather than snapping instantly — the single biggest lever
   for a native, polished feel on top of an otherwise-static layout. */
button, .session-row, .plan-row, .pick-row, .exercise-card-collapsed,
.add-exercise-btn, .date-field-row, .backup-reminder{
  transition:transform .16s cubic-bezier(.2,.8,.2,1), background-color .18s ease, border-color .18s ease, box-shadow .18s ease, opacity .18s ease;
}
.session-row:active, .plan-row:active, .pick-row:active,
.exercise-card-collapsed:active, .add-exercise-btn:active{
  transform:scale(0.985);
}
@keyframes pageIn{
  from{ opacity:0; transform:translateY(10px); }
  to{ opacity:1; transform:translateY(0); }
}
.page-anim{ animation:pageIn .26s cubic-bezier(.16,1,.3,1) both; }
@keyframes sheetBackdropIn{ from{opacity:0;} to{opacity:1;} }
@keyframes sheetSlideUp{ from{opacity:0; transform:translateY(28px);} to{opacity:1; transform:translateY(0);} }
@keyframes toastIn{ from{opacity:0; transform:translate(-50%,-10px) scale(.96);} to{opacity:1; transform:translate(-50%,0) scale(1);} }

.top{
  padding:calc(env(safe-area-inset-top, 0px) + 22px) 20px 14px;
}
.wordmark{
  font-family:var(--font-display);
  font-weight:800;
  font-size:15px;
  letter-spacing:5px;
  color:var(--accent);
  text-transform:uppercase;
  display:flex;
  align-items:center;
  gap:8px;
}
.wordmark .bar{
  width:18px;height:6px;background:var(--accent);border-radius:3px;
  box-shadow:-8px 0 0 var(--accent-soft), 8px 0 0 var(--accent-soft);
}
.wordmark-badge{
  width:30px; height:30px; border-radius:50%; object-fit:cover;
  border:1.5px solid var(--accent); flex-shrink:0;
}
.date-line{color:var(--text-faint); font-size:13px; margin-top:6px; letter-spacing:.2px;}
.page-title{
  font-family:var(--font-display);
  font-weight:800;
  font-size:34px;
  letter-spacing:1px;
  text-transform:uppercase;
  margin:2px 0 0;
  line-height:1.05;
}
.section{padding:0 20px; margin-top:22px;}
.section-label{
  font-size:11px; letter-spacing:2.5px; text-transform:uppercase;
  color:var(--text-faint); font-weight:700; margin-bottom:12px;
}

/* Home workout type grid */
.type-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
.type-card{
  position:relative;
  background:linear-gradient(155deg, var(--bg-card-2), var(--bg-card));
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  padding:18px 16px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer;
  box-shadow:0 1px 2px rgba(0,0,0,0.2), 0 6px 16px rgba(0,0,0,0.16);
  transition:transform .15s ease, border-color .15s ease;
}
.type-card:active{transform:scale(0.97);}
.type-card .tname{
  font-family:var(--font-display); font-weight:800; font-size:19px;
  letter-spacing:0.5px; text-transform:uppercase; text-align:center;
}
.type-card-edit{
  position:absolute; top:8px; right:8px; width:26px; height:26px;
  display:flex; align-items:center; justify-content:center;
  background:rgba(0,0,0,0.25); border:none; border-radius:50%;
  color:var(--text-dim); cursor:pointer;
}
.type-card-edit svg{width:13px; height:13px;}
.type-card-edit:active{background:rgba(0,0,0,0.4); color:var(--text);}
.type-card-new{
  background:none; border:1.5px dashed var(--border);
}
.type-card-new .tname{color:var(--accent-hi); font-size:15px;}

/* Recent sessions */
.session-row{
  display:flex; align-items:center; gap:14px;
  background:var(--bg-card); border:1px solid var(--border);
  border-radius:var(--radius-md); padding:14px 16px; margin-bottom:10px;
  cursor:pointer;
  box-shadow:0 1px 2px rgba(0,0,0,0.18), 0 4px 12px rgba(0,0,0,0.14);
}
.session-dot{
  width:10px;height:10px;border-radius:50%; flex-shrink:0;
  background:var(--accent);
}
.session-main{flex:1; min-width:0;}
.session-type{font-weight:700; font-size:14.5px;}
.session-date{font-size:12px; color:var(--text-faint); margin-top:2px;}
.session-vol{font-family:var(--font-mono); font-size:13.5px; color:var(--accent); text-align:right; white-space:nowrap;}
.session-vol span{display:block; font-size:10px; color:var(--text-faint); font-family:var(--font-body); margin-top:2px;}
.session-del{
  width:32px; height:32px; border-radius:50%; flex-shrink:0;
  background:none; border:none; color:var(--text-faint); cursor:pointer;
  display:flex; align-items:center; justify-content:center; padding:0;
}
.session-del svg{width:16px; height:16px;}
.session-del:active{color:var(--red); background:var(--red-soft);}

.empty-state{
  text-align:center; padding:34px 20px; color:var(--text-faint);
  border:1px dashed var(--border); border-radius:var(--radius-md); font-size:13.5px;
}

/* Calendar dashboard */
.calendar-card{
  background:var(--bg-card); border:1px solid var(--border);
  border-radius:var(--radius-lg); padding:16px;
}
.calendar-head{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:12px;}
.calendar-month{font-family:var(--font-display); font-weight:800; font-size:16px; letter-spacing:.5px; text-transform:uppercase;}
.calendar-sub-group{text-align:right;}
.calendar-streak{font-size:12px; font-weight:800; color:var(--accent-hi);}
.calendar-sub{font-size:11px; color:var(--text-faint); margin-top:1px;}
.cal-weekdays{display:grid; grid-template-columns:repeat(7,1fr); gap:6px; margin-bottom:6px;}
.cal-weekdays div{text-align:center; font-size:10px; color:var(--text-faint); letter-spacing:.5px; text-transform:uppercase;}
.cal-grid{display:grid; grid-template-columns:repeat(7,1fr); gap:6px;}
.cal-day{
  position:relative;
  aspect-ratio:1; border-radius:9px; display:flex; align-items:center; justify-content:center;
  font-family:var(--font-mono); font-size:12px; color:var(--text-dim); background:var(--bg-card-2);
  border:1px solid transparent; cursor:pointer;
}
.cal-day:active{transform:scale(0.92);}
.cal-day.empty{background:none; cursor:default;}
.cal-day.empty:active{transform:none;}
.cal-day.done{background:var(--green); color:#0C2318; font-weight:700;}
.cal-day.today{border-color:var(--accent);}
.cal-pr-star{
  position:absolute; top:-5px; right:-5px; width:14px; height:14px;
  color:var(--accent-hi); filter:drop-shadow(0 1px 2px rgba(0,0,0,0.5));
}
.cal-pr-star svg{width:100%; height:100%;}
.pr-star-inline{
  display:inline-flex; width:13px; height:13px; color:var(--accent-hi);
  margin-right:5px; vertical-align:-2px;
}
.pr-star-inline svg{width:100%; height:100%;}

/* Upcoming plans */
.plan-row{
  display:flex; align-items:center; gap:12px;
  background:var(--bg-card); border:1px solid var(--border); border-left:3px solid var(--orange);
  border-radius:var(--radius-md); padding:14px 16px; margin-bottom:10px; cursor:pointer;
  box-shadow:0 1px 2px rgba(0,0,0,0.18), 0 4px 12px rgba(0,0,0,0.14);
}
.plan-badge{
  font-size:9.5px; font-weight:800; letter-spacing:.8px; text-transform:uppercase;
  color:var(--orange); background:var(--orange-soft); padding:5px 8px; border-radius:7px; flex-shrink:0;
  white-space:nowrap;
}
.plan-main{flex:1; min-width:0;}
.plan-type{font-weight:700; font-size:14.5px;}
.plan-date{font-size:12px; color:var(--text-faint); margin-top:2px;}

/* Header bar with back button for sub pages */
.bar-top{
  display:flex; align-items:center; gap:12px;
  padding:calc(env(safe-area-inset-top, 0px) + 18px) 16px 12px;
}
/* Frozen/sticky header used on the live workout session page, wrapping
   the standard .bar-top row plus an exercise-completion progress row so
   both stay pinned together while the sets below scroll underneath. */
.session-header-sticky{
  position:sticky; top:0; z-index:30;
  background:var(--bg);
  border-bottom:1px solid var(--border);
}
.ex-progress-row{
  display:flex; align-items:center; gap:10px;
  padding:0 16px 12px;
}
.ex-progress-label{
  font-size:11px; color:var(--text-faint); font-weight:700;
  white-space:nowrap; letter-spacing:.3px; font-family:var(--font-mono);
}
.ex-progress-track{
  flex:1; height:6px; border-radius:4px; background:var(--bg-card-2); overflow:hidden;
}
.ex-progress-fill{
  height:100%; background:var(--accent-hi); border-radius:4px; transition:width .25s ease;
}
.back-btn{
  width:38px;height:38px;border-radius:50%;
  background:var(--bg-card); border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  color:var(--text); cursor:pointer; flex-shrink:0;
}
.bar-title{font-family:var(--font-display); font-weight:800; font-size:22px; letter-spacing:0.5px; text-transform:uppercase; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.workout-timer{
  flex-shrink:0; font-family:var(--font-mono); font-weight:800; font-size:14px;
  color:var(--accent-hi); background:var(--bg-card); border:1px solid var(--border);
  padding:7px 12px; border-radius:20px; letter-spacing:.3px;
}
.pause-btn{
  width:32px; height:32px; flex-shrink:0; border-radius:50%; padding:0;
  background:var(--bg-card); border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  color:var(--accent-hi); cursor:pointer;
}
.pause-btn svg{width:14px; height:14px;}
.pause-btn:active{background:var(--accent-soft);}
.stretch-row{
  display:flex; align-items:center; justify-content:space-between; gap:10px;
  margin:0 20px 16px; padding:12px 16px; background:var(--bg-card); border:1px solid var(--border);
  border-radius:var(--radius-md); cursor:pointer;
}
.stretch-row.stretch-add{
  background:none; border:1.5px dashed var(--border); justify-content:center;
  color:var(--accent-hi); font-weight:700; font-size:14px; cursor:pointer; padding:14px 16px;
}
.stretch-row.stretch-add:active{background:var(--accent-soft);}
.stretch-label{font-size:11px; color:var(--text-faint); text-transform:uppercase; letter-spacing:1.5px; font-weight:700;}
.stretch-timer{font-family:var(--font-mono); font-size:14px; color:var(--accent-hi); font-weight:700; flex:1; text-align:right; margin-right:4px;}
.stretch-done-check{color:var(--green); flex-shrink:0; transform:rotate(180deg); display:flex;}
.stretch-done-check svg{width:16px; height:16px;}

/* ---- Full-screen-style stretch timer sheet ---- */
.timer-sheet{ text-align:center; padding-top:6px; }
.timer-topbar{
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:18px;
}
.timer-topbar-close{
  width:30px; height:30px; flex-shrink:0; border-radius:50%; padding:0;
  background:none; border:none; color:var(--accent-hi); cursor:pointer;
  display:flex; align-items:center; justify-content:center;
}
.timer-topbar-close svg{width:18px; height:18px;}
.timer-topbar-title{
  font-family:var(--font-display); font-weight:800; font-size:16px;
  text-transform:uppercase; letter-spacing:.5px;
}
.timer-topbar-spacer{width:30px; flex-shrink:0;}
.timer-ring-wrap{
  position:relative; display:flex; align-items:center; justify-content:center;
  height:190px; margin:6px 0 22px;
}
.timer-ring{
  position:absolute; width:150px; height:150px; border-radius:50%;
  border:3px solid var(--accent);
}
.timer-ring-time{
  position:relative; z-index:1;
  font-family:var(--font-mono); font-weight:800; font-size:36px; color:var(--text);
  letter-spacing:.5px;
}
.timer-actions{ display:flex; justify-content:center; gap:10px; margin-bottom:22px; }
.timer-actions.two-up .timer-action-btn{ flex:1; max-width:150px; }
.timer-action-btn{
  display:flex; align-items:center; justify-content:center; gap:8px;
  padding:14px 26px; border-radius:var(--radius-md); border:none;
  background:var(--accent-soft); color:var(--accent-hi);
  font-weight:800; font-size:14px; letter-spacing:.5px; text-transform:uppercase; cursor:pointer;
}
.timer-action-btn svg{width:16px; height:16px;}
.timer-action-btn:active{background:var(--accent);color:#1B1500;}
.timer-action-btn-outline{ background:none; border:1.5px solid var(--border); color:var(--text-dim); }
.timer-action-btn-outline:active{background:var(--bg-card-2); color:var(--text);}
.timer-mode-tabs{
  display:flex; background:var(--bg-card); border:1px solid var(--border);
  border-radius:var(--radius-md); overflow:hidden;
}
.timer-mode-tab{
  flex:1; display:flex; flex-direction:column; align-items:center; gap:6px;
  padding:12px 4px; background:none; border:none; border-right:1px solid var(--border);
  color:var(--text-faint); font-size:11.5px; font-weight:700; cursor:pointer;
}
.timer-mode-tab:last-child{border-right:none;}
.timer-mode-tab.active{ background:var(--accent-soft); color:var(--accent-hi); }
.timer-mode-icon{display:flex;}
.timer-mode-icon svg{width:19px; height:19px;}

/* ---- Stop confirmation (Save/Edit Time Record) ---- */
.stop-total-time{ padding:8px 0 20px; }
.stop-total-time .n{
  font-family:var(--font-mono); font-weight:800; font-size:34px; color:var(--text);
}
.stop-total-time .label{ font-size:12.5px; color:var(--text-faint); margin-top:2px; }
.stop-option-row{
  display:flex; align-items:center; gap:14px; width:100%;
  padding:15px 4px; background:none; border:none; border-top:1px solid var(--border-soft);
  color:var(--text); font-size:15px; font-weight:600; text-align:left; cursor:pointer;
}
.stop-option-icon{display:flex; color:var(--accent-hi); flex-shrink:0;}
.stop-option-icon svg{width:19px; height:19px;}
.stop-option-row:active{background:var(--bg-card-2);}
.stop-close-btn{
  display:block; width:100%; margin-top:8px; padding:15px; border-radius:var(--radius-md);
  background:none; border:1px solid var(--border); color:var(--text-dim);
  font-weight:700; font-size:14.5px; cursor:pointer;
}
.stop-close-btn:active{background:var(--bg-card-2);}

/* ---- Edit Time (hours/minutes/seconds) ---- */
.hms-row{ display:flex; gap:10px; margin:6px 0 20px; }
.hms-field{ flex:1; display:flex; flex-direction:column; align-items:center; gap:6px; }
.hms-input{
  width:100%; background:var(--bg-card-2); border:1px solid var(--border);
  border-radius:10px; color:var(--text); text-align:center;
  font-family:var(--font-mono); font-size:20px; font-weight:800; padding:12px 2px;
}
.hms-input:focus{outline:none; border-color:var(--accent);}
.hms-field label{font-size:10.5px; color:var(--text-faint); text-transform:uppercase; letter-spacing:1px; font-weight:700;}

/* Exercise entry cards in Log view */
.exercise-card{
  margin:0 20px; padding:18px 0 20px;
  border-bottom:1px solid var(--border);
}
.exercise-card:last-of-type{ border-bottom:none; }
.exercise-card .ex-head{display:flex; justify-content:space-between; align-items:flex-start; gap:10px;}
.exercise-card .ex-name{font-weight:800; font-size:16.5px;}
.exercise-card .ex-hint{font-size:11.5px; color:var(--text-faint); margin-top:3px;}
.remove-x{
  color:var(--text-faint); background:none; border:none; font-size:18px; cursor:pointer; padding:2px 6px;
}
.reorder-col{display:flex; flex-direction:column; gap:3px; flex-shrink:0;}
.reorder-btn{
  width:26px; height:22px; border-radius:6px; padding:0;
  background:var(--bg-card-2); border:1px solid var(--border); color:var(--text-dim);
  font-size:9px; cursor:pointer; display:flex; align-items:center; justify-content:center;
}
.reorder-btn:disabled{opacity:.25; cursor:default;}
.reorder-btn:active:not(:disabled){color:var(--accent-hi); border-color:var(--accent);}

/* Collapsed (all-sets-complete) exercise row in the live session */
.exercise-card-collapsed{
  display:flex; align-items:center; gap:12px; cursor:pointer;
}
.exercise-card-collapsed .collapsed-main{flex:1; min-width:0;}
.exercise-card-collapsed .ex-name{margin-bottom:2px;}
.collapsed-meta{font-size:11.5px; color:var(--text-faint);}
.collapsed-status-chip{
  display:flex; align-items:center; gap:6px; flex-shrink:0;
  font-size:11px; font-weight:700; padding:6px 10px; border-radius:20px; white-space:nowrap;
}
.collapsed-status-chip .sw{width:8px;height:8px;border-radius:50%; flex-shrink:0;}
.collapsed-chev{color:var(--text-faint); font-size:18px; flex-shrink:0; transform:rotate(90deg);}
.exercise-card .collapse-toggle-btn{
  color:var(--text-faint); background:none; border:none; cursor:pointer;
  padding:2px 6px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
}
.exercise-card .collapse-toggle-btn svg{width:15px; height:15px; transform:rotate(180deg);}
.exercise-card .collapse-toggle-btn:active{color:var(--accent-hi);}

.date-field-row{
  display:flex; align-items:center; justify-content:space-between;
  margin:0 20px 16px; padding:12px 16px; background:var(--bg-card); border:1px solid var(--border);
  border-radius:var(--radius-md);
  box-shadow:0 1px 2px rgba(0,0,0,0.16), 0 4px 10px rgba(0,0,0,0.12);
}
.date-field-row label{font-size:11px; color:var(--text-faint); text-transform:uppercase; letter-spacing:1.5px; font-weight:700;}
.date-field-row input[type=date]{
  background:none; border:none; color:var(--accent-hi); font-family:var(--font-mono); font-size:14px;
  text-align:right;
}
.date-field-row input[type=date]::-webkit-calendar-picker-indicator{ filter:invert(70%) sepia(60%) saturate(400%) hue-rotate(0deg); opacity:.85;}
.plan-hint{margin:10px 4px 0; font-size:11.5px; color:var(--text-faint); text-align:center; line-height:1.4;}
.set-table{ margin-bottom:4px; }
.set-table-head{
  display:grid; grid-template-columns:38px 1fr 1fr 34px 22px;
  gap:8px; padding:0 2px 10px; align-items:center;
}
.set-table-head span{
  font-size:9.5px; color:var(--text-faint); letter-spacing:1.2px; text-transform:uppercase; font-weight:700; text-align:center;
}
.set-table-head span:first-child{ text-align:left; }
.set-row{
  display:grid; grid-template-columns:38px 1fr 1fr 34px 22px;
  gap:8px; align-items:center; margin-bottom:10px;
}
.set-badge{
  width:32px; height:32px; border-radius:50%; flex-shrink:0;
  background:var(--bg-card-2); border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  font-family:var(--font-mono); font-weight:800; font-size:13.5px; color:var(--text);
}
.set-badge.warmup{ color:var(--text-dim); }
.mini-weight-input{
  width:100%; min-width:0; background:var(--bg-card-2); border:1px solid var(--border);
  border-radius:8px; color:var(--text); text-align:center;
  font-family:var(--font-mono); font-size:15px; font-weight:700; padding:9px 2px;
  -moz-appearance:textfield;
}
.mini-weight-input::-webkit-outer-spin-button,

<div id="app"></div>
<div id="modal-root"></div>
<div id="numKeypad" class="num-keypad">
  <div class="num-keypad-inner">
    <div class="num-keypad-header">
      <span id="numKeypadLabel">Weight</span>
      <button type="button" class="num-keypad-done" onmousedown="event.preventDefault()" onclick="if(document.activeElement) document.activeElement.blur(); hideNumKeypad();">Done</button>
    </div>
    <div class="num-keypad-grid">
      <button type="button" onmousedown="event.preventDefault()" onclick="numKeypadPress('1')">1</button>
      <button type="button" onmousedown="event.preventDefault()" onclick="numKeypadPress('2')">2</button>
      <button type="button" onmousedown="event.preventDefault()" onclick="numKeypadPress('3')">3</button>
      <button type="button" onmousedown="event.preventDefault()" onclick="numKeypadPress('4')">4</button>
      <button type="button" onmousedown="event.preventDefault()" onclick="numKeypadPress('5')">5</button>
      <button type="button" onmousedown="event.preventDefault()" onclick="numKeypadPress('6')">6</button>
      <button type="button" onmousedown="event.preventDefault()" onclick="numKeypadPress('7')">7</button>
      <button type="button" onmousedown="event.preventDefault()" onclick="numKeypadPress('8')">8</button>

    </div>

<script>
/* ============================================================
   FEATURE BUCKETS — reusable pieces of this app, by section header.
   Search for the "==== NAME ====" comment to jump to each one. Most are
   generic and can be lifted into a new single-file app largely as-is;
   a few (marked *) are Overload-specific and mainly useful as a reference
   pattern rather than drop-in code.
   ------------------------------------------------------------
   DATA LAYER        — localStorage load/save + versioned migration
                        pattern (see migrateExerciseData/migrateTemplates),
                        plus (Overload-specific*) exercises/templates CRUD,
                        workout CRUD/stats, and date helpers.
   ROUTER            — route object + nav(r)/render() + History API
                        push/pop wiring (see popstate handler at the
                        bottom of this file) for real Android back-button
                        support with no framework.
   ACTIVE SESSION STATE — pattern for a working in-progress screen that
                        survives navigation/backgrounding by persisting
                        every field to localStorage (persistActiveSession/
                        restoreActiveSessionIfAny) and restoring on load.
   MODAL / SHEET SYSTEM — bottom-sheet + confirm-dialog machinery
                        (pushModalState/closeModal/showConfirmDialog) that
                        integrates with the router so back closes a sheet
                        before it closes the page.
   CUSTOM NUMERIC KEYPAD — in-app 0-9 (+decimal) keypad that replaces the
                        OS keyboard for numeric fields (inputmode="none" +
                        a fixed-position keypad bar), guaranteeing
                        digit-only input.
   PAUSE WORKOUT     — start/pause/resume timer pattern (shift the stored
                        start-time forward by the paused duration on
                        resume) reused by both the workout and stretch
                        timers.
   STRETCH TIMER *   — Overload-specific usage of the pause/resume timer
                        pattern, plus a "checkbox toggles pause+lock"
                        convention and a big-timer modal with a slow
                        color-pulse ring (pure CSS, no JS animation loop).
   LOG / PLAN BUILDER * — collapsible-card-on-completion pattern (auto-
                        collapse a list item once its sub-tasks are done,
                        with a manual expand override) — generalizes well
                        beyond workout sets.
   ============================================================ */
/* ============ DATA LAYER ============ */
const STORAGE_KEY = "overload_data_v2";

const DEFAULT_EXERCISES = [
  "Bench Press","Incline Bench Press","Dumbbell Press","Chest Fly","Dips",
  "Back Squat","Front Squat","Leg Press","Romanian Deadlift","Walking Lunge",
  "Deadlift","Barbell Row","Lat Pulldown","Pull-Up","Seated Cable Row",
  "Overhead Press","Barbell Curl","Tricep Pushdown","Lateral Raise","Face Pull"
];
const LEGACY_TYPE_META = {
  chest: {label:"Chest"},
  legs:  {label:"Legs"},
  back:  {label:"Back"},
  upper: {label:"Upper Body"}
};

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }

/* Older versions of this app kept a separate exercise list per workout type
   (chest/legs/back/upper), which meant the same lift (e.g. Bench Press) could
   get created multiple times under different categories with separate history.
   Exercises are now a single global list. This migrates any old per-type data,
   merging same-named exercises into one and remapping past sessions to point
   at the merged exercise so history isn't split or lost. */
function migrateExerciseData(data){
  if(!data.exercises || Array.isArray(data.exercises)) return migrateTemplates(data);
  const merged = new Map(); // lowercase name -> {id, name, increment}
  const idRemap = {}; // old id -> merged id
  for(const type in data.exercises){
    (data.exercises[type] || []).forEach(ex=>{
      const key = (ex.name || "").trim().toLowerCase();
      if(!key) return;
      if(!merged.has(key)){
        merged.set(key, {id: ex.id, name: ex.name.trim(), increment: ex.increment || 5});
      }
      idRemap[ex.id] = merged.get(key).id;
    });
  }
  (data.workouts || []).forEach(w=>{
    (w.entries || []).forEach(e=>{
      if(idRemap[e.exId]) e.exId = idRemap[e.exId];
    });
  });
  const migrated = { exercises: Array.from(merged.values()), workouts: data.workouts || [] };
  saveData(migrated);
  return migrateTemplates(migrated);
}

/* Older versions of this app had 4 fixed workout types (Chest/Legs/Back/Upper
   Body) instead of user-defined templates. This creates an editable template
   for each one — reusing the same id as the old type key, so every past
   workout's `type` field still points at the right template with no
   remapping needed. Each template is pre-loaded with the exercises most
   commonly logged under that type historically, as a helpful starting point. */
function migrateTemplates(data){
  if(data.templates && Array.isArray(data.templates)) return data;
  const templates = [];
  for(const key in LEGACY_TYPE_META){
    const hasHistory = (data.workouts||[]).some(w=>w.type===key);
    if(!hasHistory) continue;
    const freq = new Map();
    (data.workouts||[]).forEach(w=>{
      if(w.type !== key) return;
      (w.entries||[]).forEach(e=>{ freq.set(e.exId, (freq.get(e.exId)||0)+1); });
    });
    const exerciseIds = Array.from(freq.entries())
      .sort((a,b)=> b[1]-a[1])
      .map(([exId])=>exId)
      .filter(exId => (data.exercises||[]).some(ex=>ex.id===exId));
    templates.push({ id:key, name:LEGACY_TYPE_META[key].label, exerciseIds });
  }
  data.templates = templates;
  saveData(data);
  return data;
}

function loadData(){
  let raw = localStorage.getItem(STORAGE_KEY);
  if(raw){
    try{ return migrateExerciseData(JSON.parse(raw)); }catch(e){}
  }
  const data = { exercises: DEFAULT_EXERCISES.map(name => ({id:uid(), name, increment:5})), workouts:[], templates:[] };
  saveData(data);
  return data;
}
function saveData(d){ localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); }

let DATA = loadData();

/* ---- Backup reminder tracking ---- */
const BACKUP_META_KEY = "overload_backup_meta_v1";
function loadBackupMeta(){
  try{
    const raw = localStorage.getItem(BACKUP_META_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  return { lastExportAt:null, lastExportWorkoutCount:0, snoozedUntil:null };
}
function saveBackupMeta(m){ localStorage.setItem(BACKUP_META_KEY, JSON.stringify(m)); }
let BACKUP_META = loadBackupMeta();
function daysSince(iso){ return Math.floor((new Date() - new Date(iso)) / (1000*60*60*24)); }

function shouldShowBackupReminder(){
  if(DATA.workouts.length === 0) return false;
  if(BACKUP_META.snoozedUntil && new Date() < new Date(BACKUP_META.snoozedUntil)) return false;
  if(!BACKUP_META.lastExportAt) return DATA.workouts.length >= 3;
  const newWorkouts = DATA.workouts.length - (BACKUP_META.lastExportWorkoutCount || 0);
  return daysSince(BACKUP_META.lastExportAt) >= 14 || newWorkouts >= 10;
}
function backupReminderMessage(){
  if(!BACKUP_META.lastExportAt) return "You haven't backed up your data yet. It only lives on this phone.";
  const newWorkouts = DATA.workouts.length - (BACKUP_META.lastExportWorkoutCount || 0);
  const days = daysSince(BACKUP_META.lastExportAt);
  if(newWorkouts >= 10) return `You've logged ${newWorkouts} workouts since your last backup.`;
  return `It's been ${days} days since your last backup.`;
}
function snoozeBackupReminder(){
  const d = new Date(); d.setDate(d.getDate() + 7);
  BACKUP_META.snoozedUntil = d.toISOString();
  saveBackupMeta(BACKUP_META);
  render();
}
function recordBackupDone(){
  BACKUP_META = { lastExportAt: new Date().toISOString(), lastExportWorkoutCount: DATA.workouts.length, snoozedUntil: null };
  saveBackupMeta(BACKUP_META);
}

/* ---- Exercises & Templates (CRUD over the global exercise/template lists) ---- */
function getExercises(){ return [...DATA.exercises].sort((a,b)=> a.name.localeCompare(b.name)); }
function findExercise(id){ return DATA.exercises.find(e=>e.id===id) || null; }
function addExercise(name, increment){
  const ex = {id:uid(), name:name.trim(), increment: increment || 5};
  DATA.exercises.push(ex);
  saveData(DATA);
  return ex;
}
function deleteExercise(id){
  DATA.exercises = DATA.exercises.filter(e=>e.id!==id);
  saveData(DATA);
}

function getTemplates(){ return DATA.templates || []; }
function getTemplate(id){ return (DATA.templates||[]).find(t=>t.id===id) || null; }
function templateLabel(id){ const t = getTemplate(id); return t ? t.name : "Workout"; }
function buildEntriesFromTemplate(templateId){
  const t = getTemplate(templateId);
  if(!t) return [];
  return t.exerciseIds.map(exId=>{
    const ex = findExercise(exId);
    if(!ex) return null;
    const suggested = (getSuggestedWeight(exId)?.weight) || 0;
    return {
      exId, name: ex.name, warmups: [],
      sets: [{weight:suggested, reps:10, done:false}, {weight:suggested, reps:10, done:false}, {weight:suggested, reps:10, done:false}]
    };
  }).filter(Boolean);
}

/* ---- Workouts, Progress Stats & PR Detection ---- */
function computeStatus(reps){
  if(reps.some(r => r < 6)) return "red";
  if(reps.every(r => r >= 10)) return "green";
  return "orange";
}
const STATUS_LABEL = {
  green:{text:"Hit target — increase weight next time", short:"Increase"},
  orange:{text:"Solid work — maintain this weight next time", short:"Maintain"},
  red:{text:"Below range — reduce weight next time", short:"Decrease"}
};

function upsertWorkout(existingId, type, dateStr, entries){
  const allFilled = entries.every(en => en.sets.every(s => s.done && s.reps !== null));
  const status = allFilled ? "completed" : "planned";
  const iso = new Date(dateStr + "T12:00:00").toISOString();
  if(existingId){
    const w = DATA.workouts.find(w=>w.id===existingId);
    if(w){
      w.type = type; w.date = iso; w.entries = entries; w.status = status;
      saveData(DATA);
      return w;
    }
  }
  const w = { id:uid(), date:iso, type, entries, status };
  DATA.workouts.push(w);
  saveData(DATA);
  return w;
}
function workoutStatus(w){ return w.status || "completed"; }

/* Backward compatibility: entries saved before per-set weights existed
   used a single {weight, reps:[a,b,c]} shape. Normalize to {sets:[{weight,reps}...]}. */
function normalizeEntrySets(e){
  if(e.sets) return e.sets;
  return (e.reps || [null,null,null]).map(r => ({ weight: e.weight || 0, reps: r }));
}

/* ---- Date Helpers ---- */
function dateKeyLocal(d){
  const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), day=String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function todayStr(){ return dateKeyLocal(new Date()); }
function tomorrowStr(){ const d = new Date(); d.setDate(d.getDate()+1); return dateKeyLocal(d); }
function getCompletedDatesSet(){
  const set = new Set();
  DATA.workouts.forEach(w=>{
    if(w.entries.some(e=>e.status !== null)) set.add(dateKeyLocal(new Date(w.date)));
  });
  return set;
}

function deleteWorkout(workoutId){
  const w = DATA.workouts.find(w=>w.id===workoutId);
  if(!w) return;
  const isPlanned = workoutStatus(w) !== "completed";
  const label = `${templateLabel(w.type)} · ${fmtDate(w.date)}`;
  const msg = isPlanned ? `Delete this planned workout (${label})?` : `Delete this session (${label})? This can't be undone.`;
  showConfirmDialog(msg, ()=>{
    DATA.workouts = DATA.workouts.filter(w=>w.id!==workoutId);
    saveData(DATA);
    selectedPoint = null;
    showToast(isPlanned ? "Plan deleted" : "Session deleted");
    render();
  });
}

function oneRepMax(weight, firstSetReps){
  if(!weight || !firstSetReps) return 0;
  const denom = 1.0278 - 0.0278 * firstSetReps;
  if(denom <= 0.05) return weight; // guard against absurd high-rep denominators
  return weight / denom;
}

function getExerciseHistory(exId){
  const rows = [];
  const sorted = [...DATA.workouts].sort((a,b)=> new Date(a.date)-new Date(b.date));
  sorted.forEach(w=>{
    w.entries.filter(e=>e.exId===exId && e.status !== null).forEach(e=>{
      const sets = normalizeEntrySets(e);
      const firstSet = sets[0] || {weight:0, reps:null};
      rows.push({
        wId:w.id, date:w.date,
        sets, warmups: e.warmups || [],
        weight: firstSet.weight, reps: sets.map(s=>s.reps),
        volume:e.volume, status:e.status,
        oneRM: oneRepMax(firstSet.weight, firstSet.reps)
      });
    });
  });
  rows.forEach((r,i)=> r.n = i+1);
  return rows;
}

function getLastEntry(exId){
  const h = getExerciseHistory(exId);
  return h.length ? h[h.length-1] : null;
}

function getSuggestedWeight(exId){
  const ex = findExercise(exId);
  const last = getLastEntry(exId);
  if(!last) return null;
  let w = last.weight;
  if(last.status === "green") w += ex.increment;
  else if(last.status === "red") w -= ex.increment;
  return { weight: Math.max(w,0), basedOn:last };
}

/* ---- Streak ---- */
function getCurrentStreak(){
  const completed = getCompletedDatesSet();
  let streak = 0;
  let cursor = new Date();
  if(!completed.has(dateKeyLocal(cursor))){
    cursor.setDate(cursor.getDate() - 1);
  }
  while(completed.has(dateKeyLocal(cursor))){
    streak++;
    cursor.setDate(cursor.getDate() - 1);
  }
  return streak;
}

/* ---- Personal Records ----
   A PR is marked the first time an exercise entry's volume exceeds every
   prior completed entry for that same exercise (chronologically). */
function getAllPRKeys(){
  const prSet = new Set();
  const exIds = new Set();
  DATA.workouts.forEach(w => w.entries.forEach(e => { if(e.status !== null) exIds.add(e.exId); }));
  exIds.forEach(exId=>{
    const hist = getExerciseHistory(exId);
    let runningMax = 0;
    hist.forEach(row=>{
      if(row.volume > runningMax) prSet.add(`${row.wId}::${exId}`);
      runningMax = Math.max(runningMax, row.volume);
    });
  });
  return prSet;
}
function workoutHasPR(w, prSet){
  return w.entries.some(e => prSet.has(`${w.id}::${e.exId}`));
}
function getPRDatesSet(prSet){
  const dates = new Set();
  DATA.workouts.forEach(w=>{
    w.entries.forEach(e=>{
      if(prSet.has(`${w.id}::${e.exId}`)) dates.add(dateKeyLocal(new Date(w.date)));
    });
  });
  return dates;
}

function fmtDate(iso){
  const d = new Date(iso);
  return d.toLocaleDateString(undefined,{month:"short", day:"numeric"});
}
function fmtDateFull(iso){
  const d = new Date(iso);
  return d.toLocaleDateString(undefined,{weekday:"long", month:"long", day:"numeric", year:"numeric"});
}
function fmtDateSmart(iso){
  const key = dateKeyLocal(new Date(iso));
  if(key === todayStr()) return "Today";
  if(key === tomorrowStr()) return "Tomorrow";
  return fmtDate(iso);
}

/* ============ ROUTER ============
   Minimal hash-free router: a `route` object + nav(r) that pushes a real
   History API entry and re-renders. Reusable as-is in any single-file app —
   see popstate handler at the bottom for the Android-back-button wiring. */
let route = {name:"home"};

/* ============ ACTIVE SESSION STATE ============
   Working state for the log/plan-builder screen, persisted to localStorage
   on every edit so an in-progress session survives tab switches, the Android
   back button, and the app being killed/reloaded in the background. */
let sessionEntries = []; // working state for the log/plan builder screen
let sessionType = null;
let sessionDate = todayStr();
let editingWorkoutId = null; // set when continuing an existing planned workout

let templateDraftId = null; // set when editing an existing template, null when creating a new one
let templateDraftName = "";
let templateDraftExerciseIds = [];
let sessionStartTime = null; // Date.now() when this log screen was entered, for the workout timer
let sessionTimerInterval = null;
let sessionPausedAt = null; // Date.now() when the workout was paused; null while running

let stretchStartTime = null; // Date.now() when the current running segment started; null if never started
let stretchPausedAt = null;  // Date.now() when paused/stopped; null while actively ticking
// idle: never started · running: ticking · paused: frozen mid-session ·
// stopped: Stop was tapped, showing the Save/Edit confirmation · done: finalized
let stretchPhase = "idle";
let stretchStopView = "confirm"; // while stopped: 'confirm' (Save/Edit choice) or 'edit' (H/M/S picker)
let stretchMode = "stopwatch"; // 'stopwatch' | 'countdown' | 'intervals' — only stopwatch is functional today
let stretchEditH = 0, stretchEditM = 0, stretchEditS = 0; // scratch values while editing the recorded time
let stretchTimerInterval = null;

// Exercise cards whose all-sets-complete state has been manually expanded
// by the user (keyed by exId), overriding the default auto-collapse.
let expandedOverrides = new Set();

/* ---- Active session persistence ----
   Keeps an in-progress workout alive across tab switches, back-button taps,
   and even the app being reloaded/killed in the background — it's only
   cleared by Finish Workout, Discard Workout, or an explicit Save. */
const ACTIVE_SESSION_KEY = "overload_active_session_v1";
function persistActiveSession(){
  if(!sessionType){ clearActiveSessionStorage(); return; }
  try{
    localStorage.setItem(ACTIVE_SESSION_KEY, JSON.stringify({
      type: sessionType, date: sessionDate, editingWorkoutId,
      startTime: sessionStartTime, entries: sessionEntries,
      pausedAt: sessionPausedAt,
      stretchStartTime, stretchPausedAt, stretchPhase, stretchMode,
      expanded: Array.from(expandedOverrides)
    }));
  }catch(e){}
}
function clearActiveSessionStorage(){
  try{ localStorage.removeItem(ACTIVE_SESSION_KEY); }catch(e){}
}
function restoreActiveSessionIfAny(){
  try{
    const raw = localStorage.getItem(ACTIVE_SESSION_KEY);
    if(!raw) return;
    const s = JSON.parse(raw);
    if(!s || !s.type) return;
    sessionType = s.type;
    sessionDate = s.date;
    editingWorkoutId = s.editingWorkoutId ?? null;
    sessionStartTime = s.startTime ?? null;
    sessionEntries = s.entries || [];
    sessionPausedAt = s.pausedAt ?? null;
    stretchStartTime = s.stretchStartTime ?? null;
    stretchPausedAt = s.stretchPausedAt ?? null;
    stretchMode = s.stretchMode || "stopwatch";
    if(s.stretchPhase){
      stretchPhase = s.stretchPhase;
    }else if(s.stretchDuration !== undefined && s.stretchDuration !== null && !s.stretchDone){
      // Legacy shape (pre-Start/Stop redesign): a completed stretch stored
      // only a final duration. Convert it into the finalized "done" phase.
      stretchPhase = "done";
      stretchPausedAt = Date.now();
      stretchStartTime = Date.now() - (s.stretchDuration * 1000);
    }else if(s.stretchDone !== undefined){
      // Legacy shape (pre-Start/Stop redesign, post-pause-button): map the
      // old boolean straight onto the new phase model.
      stretchPhase = s.stretchDone ? "done" : (stretchStartTime === null ? "idle" : (stretchPausedAt !== null ? "paused" : "running"));
    }else{
      stretchPhase = stretchStartTime === null ? "idle" : "running";
    }
    stretchStopView = "confirm";
    expandedOverrides = new Set(s.expanded || []);
  }catch(e){}
}

/* A session is "future" (a plan being drafted for later) when its date is
   after today. Future plans never show a running timer — the clock only
   ticks for a workout actually being performed today. */
function isFuturePlan(){
  return !!sessionType && sessionDate > todayStr();
}

function nav(r){
  route = r;
  history.pushState({route:r}, "", "");
  render();
  window.scrollTo(0,0);
}

/* Navigates to a route right after a confirm-dialog's "Yes" handler runs.
   closeModal() (called just before that handler) already triggers an async
   history.back() to consume the dialog's own history entry; pushing a new
   route immediately can get clobbered when that back() lands afterward and
   restores the stale route underneath. Waiting for that pop (or a short
   timeout, in case none was pending) before replacing the entry avoids
   ending up back on the old — now stale/empty — screen. */
function navAfterModalClose(r){
  let done = false;
  const settle = ()=>{
    if(done) return;
    done = true;
    window.removeEventListener("popstate", settle);
    route = r;
    history.replaceState({route:r}, "", "");
    render();
    window.scrollTo(0,0);
  };
  window.addEventListener("popstate", settle);
  setTimeout(settle, 50);
}

let _lastRenderedRouteKey = null;
function render(){
  const app = document.getElementById("app");
  let html = "";
  if(route.name === "home") html = viewHome();
  else if(route.name === "log") html = viewLog();
  else if(route.name === "progress") html = viewProgressList();
  else if(route.name === "session") html = viewSessionDetail(route.workoutId);
  else if(route.name === "day") html = viewDayDetail(route.date);
  else if(route.name === "detail") html = viewExerciseDetail(route.exId);
  else if(route.name === "manage") html = viewManage();
  else if(route.name === "templateEdit") html = viewTemplateEdit();
  else if(route.name === "startWorkout") html = viewStartWorkout();

  const showResumeBar = sessionType && route.name !== "log" && !isFuturePlan();
  // Only play the page-enter animation when navigating to a genuinely
  // different screen — in-place re-renders from data changes (checking off
  // a set, toggling a timer) reuse the same route and skip it, so the UI
  // doesn't flicker/fade on every rapid interaction.
  const routeKey = JSON.stringify(route);
  const isNewRoute = routeKey !== _lastRenderedRouteKey;
  _lastRenderedRouteKey = routeKey;
  app.innerHTML = (isNewRoute ? `<div class="page-anim">${html}</div>` : html) + viewBottomNav(showResumeBar);
  if(isNewRoute){
    const pageEl = app.querySelector(".page-anim");
    if(pageEl){
      pageEl.addEventListener("animationend", ()=>{ pageEl.classList.remove("page-anim"); }, {once:true});
    }
  }
  app.style.paddingBottom = showResumeBar ? "154px" : "96px";
  afterRender();
}

/* ============ HOME ============ */
function renderCalendar(){
  const now = new Date();
  const year = now.getFullYear(), month = now.getMonth();
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const completed = getCompletedDatesSet();
  const prDates = getPRDatesSet(getAllPRKeys());
  const todayKey = todayStr();
  const monthName = now.toLocaleDateString(undefined, {month:"long", year:"numeric"});
  const streak = getCurrentStreak();

  let cells = "";
  for(let i=0;i<firstDay;i++) cells += `<div class="cal-day empty"></div>`;
  for(let d=1; d<=daysInMonth; d++){
    const key = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const classes = ["cal-day"];
    if(completed.has(key)) classes.push("done");
    if(key === todayKey) classes.push("today");
    const star = prDates.has(key) ? `<span class="cal-pr-star">${ICONS.star}</span>` : "";
    cells += `<div class="${classes.join(' ')}" onclick="nav({name:'day', date:'${key}'})">${star}${d}</div>`;
  }

  return `
    <div class="calendar-card">
      <div class="calendar-head">
        <div class="calendar-month">${monthName}</div>
        <div class="calendar-sub-group">
          ${streak > 0 ? `<div class="calendar-streak">🔥 ${streak} day${streak===1?"":"s"}</div>` : ""}
          <div class="calendar-sub">${completed.size} day${completed.size===1?"":"s"} trained</div>
        </div>
      </div>
      <div class="cal-weekdays"><div>S</div><div>M</div><div>T</div><div>W</div><div>T</div><div>F</div><div>S</div></div>
      <div class="cal-grid">${cells}</div>
    </div>
  `;
}

function viewHome(){

    .sort((a,b)=> new Date(a.date)-new Date(b.date));
  const recent = [...completedWorkouts].sort((a,b)=> new Date(b.date)-new Date(a.date)).slice(0,5);
  const today = new Date().toLocaleDateString(undefined,{weekday:"long", month:"long", day:"numeric"});
  const prSet = getAllPRKeys();

  let plans = "";
  plannedWorkouts.forEach(w=>{
    const doneCount = w.entries.filter(e=>e.status!==null).length;
    plans += `
      <div class="plan-row" onclick="continuePlanned('${w.id}')">

      </div>`;
  });

  let sessions = "";
  if(recent.length === 0){
    sessions = `<div class="empty-state">No sessions logged yet.<br>Pick a workout above to start tracking.</div>`;
  }else{
    recent.forEach(w=>{
      const totalVol = w.entries.reduce((s,e)=>s+e.volume,0);
      const worstStatus = w.entries.some(e=>e.status==="red") ? "red" : (w.entries.some(e=>e.status==="orange") ? "orange" : "green");
      const dotColor = worstStatus === "green" ? "var(--green)" : worstStatus === "orange" ? "var(--orange)" : "var(--red)";

      sessions += `
        <div class="session-row">

          <div class="session-main" onclick="nav({name:'session', workoutId:'${w.id}'})">
            <div class="session-type">${isPR ? `<span class="pr-star-inline">${ICONS.star}</span>` : ""}${templateLabel(w.type)} · ${w.entries.length} exercise${w.entries.length>1?"s":""}</div>

  const backupReminder = shouldShowBackupReminder() ? `

        <div class="backup-reminder-text">
          <div class="backup-reminder-title">Back up your data</div>
          <div class="backup-reminder-sub">${backupReminderMessage()}</div>
        </div>
        <div class="backup-reminder-actions">
          <button class="br-btn br-btn-primary" onclick="exportData()">Export</button>
          <button class="br-btn" onclick="snoozeBackupReminder()">Later</button>
        </div>
      </div>
    </div>
  ` : "";

  return `
    <div class="top">
      <div class="wordmark"><img class="wordmark-badge" src="icons/icon-512-badge.png" alt="Overload mascot">OVERLOAD</div>
      <div class="date-line">${today}</div>
      <div class="page-title">Train today</div>
    </div>
    ${backupReminder}
    <div class="section">
      <button class="finish-btn" style="margin-top:0;" onclick="nav({name:'startWorkout'})">Start Workout</button>
    </div>
    <div class="section">
      <div class="section-label">This month</div>
      ${renderCalendar()}
    </div>
    <div class="section">
      <div class="section-label">Upcoming plans</div>
      ${plans}
      <div class="add-exercise-btn" onclick="openPlanTypePicker()">+ Plan a Future Workout</div>
    </div>
    <div class="section">
      <div class="section-label">Recent sessions</div>
      ${sessions}
    </div>
  `;
}

/* ============ LOG / PLAN BUILDER ============ */
function renderSetRow(idx, group, si, set, badgeLabel, isWarmup){

    <div class="set-row">

      <input type="text" inputmode="none" autocomplete="off" class="mini-weight-input" id="weight-input-${group}-${idx}-${si}" placeholder="weight"
        value="${set.weight === 0 ? "" : set.weight}"
        onfocus="focusNumField(${idx}, '${group}', ${si}, 'weight', this)"
        onblur="blurNumField()"
        oninput="handleNumFieldTyped(this, ${idx}, '${group}', ${si}, 'weight')">
      <input type="text" inputmode="none" autocomplete="off" class="mini-reps-input" id="reps-input-${group}-${idx}-${si}" placeholder="reps" value="${set.reps ?? ""}"
        onfocus="focusNumField(${idx}, '${group}', ${si}, 'reps', this)"
        onblur="blurNumField()"
        oninput="handleNumFieldTyped(this, ${idx}, '${group}', ${si}, 'reps')">
      <label class="set-check" aria-label="Mark set complete">
        <input type="checkbox" id="check-${group}-${idx}-${si}" ${set.done ? "checked" : ""}
          onchange="toggleSetDone(${idx}, '${group}', ${si}, this.checked)">
        <span class="set-check-box"></span>
      </label>
      ${isWarmup
        ? `<button class="set-line-remove" onclick="removeWarmup(${idx}, ${si})" aria-label="Remove warm-up set">✕</button>`
        : `<div></div>`}
    </div>
  `;
}

function viewLog(){
  const type = sessionType;
  const meta = { label: templateLabel(type) };

  let cards = "";
  let completedCount = 0;
  sessionEntries.forEach((entry, idx)=>{
    const complete = isEntryComplete(entry);

    if(complete){
      completedCount++;
    }else{
      // Only meaningful while complete — once a set is unchecked, drop any
      // manual "expanded" override so the card starts collapsed fresh the
      // next time every set is completed again.
      expandedOverrides.delete(entry.exId);
    }

    // Collapse automatically once every working set is complete, unless
    // the user has manually expanded this specific exercise.
    if(complete && !expandedOverrides.has(entry.exId)){
      const repsNow = entry.sets.map(s=>s.reps);
      const status = computeStatus(repsNow.map(Number));
      const volume = entry.sets.reduce((sum,s)=> sum + s.weight*s.reps, 0);
      cards += `
        <div class="exercise-card exercise-card-collapsed" onclick="toggleExerciseCollapse('${entry.exId}')">
          <div class="collapsed-main">
            <div class="ex-name">${entry.name}</div>
            <div class="collapsed-meta">${entry.sets.length} sets completed · ${volume.toLocaleString()} lbs vol.</div>
          </div>
          <div class="collapsed-status-chip status-${status}"><span class="sw"></span>${STATUS_LABEL[status].short}</div>
          <div class="collapsed-chev">${ICONS.chevronDown}</div>
        </div>
      `;
      return;
    }

    const suggestion = getSuggestedWeight(entry.exId);
    const hint = suggestion
      ? `Last: ${suggestion.basedOn.weight} lbs → suggested ${suggestion.weight} lbs`
      : `First time logging this lift`;

    const repsNow = entry.sets.map(s=>s.reps);
    let statusHtml = `<div class="status-preview status-neutral" id="status-${idx}"><span class="sw"></span>Check off all 3 sets to see status</div>`;
    if(complete){
      const status = computeStatus(repsNow.map(Number));
      statusHtml = `<div class="status-preview status-${status}" id="status-${idx}"><span class="sw"></span>${STATUS_LABEL[status].text}</div>`;
    }

    const warmupRows = entry.warmups.map((s,si) => renderSetRow(idx, "warmups", si, s, "W", true)).join("");
    const setRows = entry.sets.map((s,si) => renderSetRow(idx, "sets", si, s, si+1, false)).join("");

    cards += `
      <div class="exercise-card">
        <div class="ex-head">
          <div class="reorder-col">
            <button class="reorder-btn" ${idx===0 ? "disabled" : ""} onclick="moveEntry(${idx}, -1)" aria-label="Move up">▲</button>
            <button class="reorder-btn" ${idx===sessionEntries.length-1 ? "disabled" : ""} onclick="moveEntry(${idx}, 1)" aria-label="Move down">▼</button>
          </div>
          <div style="flex:1; min-width:0;">
            <div class="ex-name">${entry.name}</div>
            <div class="ex-hint">${hint}</div>
          </div>
          <div style="display:flex; align-items:center; gap:2px; flex-shrink:0;">
            ${complete
              ? `<button class="collapse-toggle-btn" onclick="toggleExerciseCollapse('${entry.exId}')" aria-label="Collapse exercise">${ICONS.chevronDown}</button>`
              : ``}
            <button class="remove-x" onclick="removeSessionEntry(${idx})">✕</button>
          </div>
        </div>

        <div class="set-table">
          <div class="set-table-head"><span>Set</span><span>Weight</span><span>Reps</span><span>Done</span><span></span></div>
          ${warmupRows}${setRows}
        </div>
        <button class="add-warmup-btn" onclick="addWarmup(${idx})">+ Add Warm-up Set</button>

        ${statusHtml}
      </div>
    `;
  });

  const hasEntries = sessionEntries.length > 0;
  const allFilled = hasEntries && sessionEntries.every(e => e.sets.every(s=>s.done && s.reps!==null && s.reps!==""));
  const btnLabel = allFilled ? "Finish Workout" : "Save Plan for Later";
  const totalCount = sessionEntries.length;
  const progressPct = totalCount ? Math.round((completedCount/totalCount)*100) : 0;

  return `
    <div class="session-header-sticky">
      <div class="bar-top">
        <div class="back-btn" onclick="nav({name:'home'})">${ICONS.back}</div>
        <div class="bar-title" style="flex:1; min-width:0;">${meta.label}</div>
        ${isFuturePlan() ? "" : `
          <button class="pause-btn" id="pauseBtn" onclick="togglePauseSession()" aria-label="${sessionPausedAt ? "Resume workout" : "Pause workout"}">${sessionPausedAt ? ICONS.play : ICONS.pause}</button>
          <div class="workout-timer" id="workoutTimer">0:00</div>
        `}
      </div>
      ${hasEntries ? `
        <div class="ex-progress-row">
          <div class="ex-progress-label">${completedCount}/${totalCount} Exercises</div>
          <div class="ex-progress-track"><div class="ex-progress-fill" style="width:${progressPct}%"></div></div>
        </div>
      ` : ""}
    </div>
    <div class="date-field-row">
      <label>Date</label>
      <input type="date" value="${sessionDate}" onchange="setSessionDate(this.value)">
    </div>
    ${isFuturePlan() ? "" : renderStretchRow()}
    ${cards || `<div class="empty-state" style="margin:0 20px;">Add an exercise below to start this session.</div>`}
    <div class="add-exercise-btn" onclick="openExercisePicker()">+ Add Exercise</div>
    <div style="padding:0 20px;">
      <button class="finish-btn" id="finishBtn" ${hasEntries ? "" : "disabled"} onclick="saveSession()">${btnLabel}</button>
      <div id="planHint" class="plan-hint" style="display:${(!allFilled && hasEntries) ? "block" : "none"}">Fill in every working set to finish now, or leave sets blank to save this as a plan and complete it later.</div>
      <button class="discard-btn" onclick="discardWorkout()">Discard Workout</button>
    </div>
  `;
}

function setSessionDate(val){ sessionDate = val; persistActiveSession(); render(); }

/* ============ STRETCH TIMER ============
   Phase model: idle (never started) -> running -> paused -> stopped
   (showing the Save/Edit choice) -> done (finalized). stretchStartTime
   shifts forward on resume (same trick as the workout pause); stretchPausedAt
   freezes the displayed elapsed time whenever ticking has stopped, whatever
   the reason (paused, stopped, or done). Only the "stopwatch" mode is wired
   up with real logic today — Countdown and Intervals are placeholder tabs. */
function stretchElapsedSeconds(){
  if(stretchStartTime === null) return 0;
  const end = stretchPausedAt !== null ? stretchPausedAt : Date.now();
  return Math.max(0, Math.floor((end - stretchStartTime)/1000));
}
function renderStretchRow(){
  if(stretchPhase === "idle"){
    return `<div class="stretch-row stretch-add" onclick="startStretch()">+ Add Stretch</div>`;
  }
  const label = stretchPhase === "done" ? "Stretched" : (stretchPhase === "paused" || stretchPhase === "stopped" ? "Paused" : "Stretching");
  return `
    <div class="stretch-row" onclick="openStretchTimerModal()">
      <div class="stretch-label">${label}</div>
      <div class="stretch-timer" id="stretchTimer">${fmtDuration(stretchElapsedSeconds())}</div>
      ${stretchPhase === "done" ? `<span class="stretch-done-check">${ICONS.chevronDown}</span>` : `<span class="collapsed-chev">${ICONS.chevronDown}</span>`}
    </div>`;
}
function startStretch(){
  stretchStartTime = null;
  stretchPausedAt = null;
  stretchPhase = "idle";
  stretchStopView = "confirm";
  persistActiveSession();
  render();
  openStretchTimerModal();
}
function beginStretchRun(){
  if(stretchMode !== "stopwatch"){
    showToast(`${stretchMode === "countdown" ? "Countdown" : "Intervals"} timers are coming soon`);
    return;
  }
  stretchStartTime = Date.now();
  stretchPausedAt = null;
  stretchPhase = "running";
  persistActiveSession();
  startStretchTimer();
  render();
  refreshStretchSheet();
}
function toggleStretchPause(){
  if(stretchPhase === "running"){
    stretchPausedAt = Date.now();
    stretchPhase = "paused";
    stopStretchTimer();
  }else if(stretchPhase === "paused"){
    stretchStartTime += (Date.now() - stretchPausedAt);
    stretchPausedAt = null;
    stretchPhase = "running";
    startStretchTimer();
  }else{
    return;
  }
  persistActiveSession();
  render();
  refreshStretchSheet();
}
function stopStretchRun(){
  if(stretchPhase !== "running" && stretchPhase !== "paused") return;
  if(stretchPausedAt === null) stretchPausedAt = Date.now();
  stretchPhase = "stopped";
  stretchStopView = "confirm";
  stopStretchTimer();
  persistActiveSession();
  render();
  refreshStretchSheet();
}
function cancelStretchStop(){
  // "Close" on the Save/Edit confirmation — undo the Stop and go back to paused.
  stretchPhase = "paused";
  stretchStopView = "confirm";
  persistActiveSession();
  render();
  refreshStretchSheet();
}
function confirmSaveStretchTime(){
  stretchPhase = "done";
  persistActiveSession();
  render();
  closeModal();
  showToast("Stretch saved");
}
function openEditStretchTimeModal(){
  const total = stretchElapsedSeconds();
  stretchEditH = Math.floor(total/3600);
  stretchEditM = Math.floor((total%3600)/60);
  stretchEditS = total%60;
  stretchStopView = "edit";
  refreshStretchSheet();
}
function backToStretchStopConfirm(){
  stretchStopView = "confirm";
  refreshStretchSheet();
}
function confirmEditStretchTime(){
  const total = Math.max(0, stretchEditH*3600 + stretchEditM*60 + stretchEditS);
  const now = Date.now();
  stretchStartTime = now - total*1000;
  stretchPausedAt = now;
  stretchPhase = "done";
  persistActiveSession();
  render();
  closeModal();
  showToast("Stretch saved");
}
function setStretchMode(mode){
  stretchMode = mode;
  refreshStretchSheet();
}
function updateStretchDisplay(){
  if(stretchPhase !== "running") return;
  const txt = fmtDuration(stretchElapsedSeconds());
  const el1 = document.getElementById("stretchTimer");
  if(el1) el1.textContent = txt;
  const el2 = document.getElementById("stretchTimerBig");
  if(el2) el2.textContent = txt;
}
function startStretchTimer(){
  stopStretchTimer();
  updateStretchDisplay();
  stretchTimerInterval = setInterval(updateStretchDisplay, 1000);
}
function stopStretchTimer(){
  if(stretchTimerInterval){ clearInterval(stretchTimerInterval); stretchTimerInterval = null; }
}

/* ============ PAUSE WORKOUT ============
   Pausing shifts sessionStartTime forward by however long the pause lasts
   once resumed, so every existing elapsed-time calculation (header timer,
   resume bar, saved duration) keeps working unchanged and simply excludes
   paused time automatically. */
function pauseSession(){
  if(!sessionStartTime || sessionPausedAt) return;
  sessionPausedAt = Date.now();
  stopSessionTimer();
  persistActiveSession();
  updateTimerDisplay();
  updatePauseButton();
}
function resumeSession(){
  if(!sessionPausedAt) return;
  const pausedMs = Date.now() - sessionPausedAt;
  sessionStartTime += pausedMs;
  sessionPausedAt = null;
  persistActiveSession();
  startSessionTimer();
  updatePauseButton();
}
function togglePauseSession(){
  if(sessionPausedAt) resumeSession(); else pauseSession();
}
function updatePauseButton(){
  const btn = document.getElementById("pauseBtn");
  if(btn){
    btn.innerHTML = sessionPausedAt ? ICONS.play : ICONS.pause;
    btn.setAttribute("aria-label", sessionPausedAt ? "Resume workout" : "Pause workout");
  }
}

function moveEntry(idx, dir){
  const newIdx = idx + dir;
  if(newIdx < 0 || newIdx >= sessionEntries.length) return;
  [sessionEntries[idx], sessionEntries[newIdx]] = [sessionEntries[newIdx], sessionEntries[idx]];
  persistActiveSession();
  render();
}

function setSetWeight(idx, group, si, val){
  sessionEntries[idx][group][si].weight = val === "" ? 0 : Number(val);
  persistActiveSession();
}
function setSetReps(idx, group, si, val){
  const set = sessionEntries[idx][group][si];
  set.reps = val === "" ? "" : Math.max(0, Number(val));
  if(group === "sets"){
    updateStatusPreview(idx);
    updateFinishButton();

  persistActiveSession();
}

/* ============ CUSTOM NUMERIC KEYPAD ============
   Weight/reps inputs use inputmode="none" so the device's own keyboard
   never appears; this in-app keypad (digits + a decimal point for weight)
   is the only way to enter values, so nothing but numbers can get typed. */
let activeNumField = null; // {idx, group, si, kind: 'weight'|'reps'}
let activeNumSelectAll = false; // true right after focusing — next press replaces the whole value

function numFieldElId(idx, group, si, kind){
  if(kind === "stretchH") return "editHoursInput";
  if(kind === "stretchM") return "editMinutesInput";
  if(kind === "stretchS") return "editSecondsInput";
  return kind === "weight" ? `weight-input-${group}-${idx}-${si}` : `reps-input-${group}-${idx}-${si}`;
}
function focusNumField(idx, group, si, kind, el){
  activeNumField = {idx, group, si, kind};
  activeNumSelectAll = true;
  try{ el.select(); }catch(e){}
  showNumKeypad(kind);
}
function blurNumField(){
  // Deferred so a keypad button's mousedown (which calls preventDefault to
  // keep focus on the field) has already run before we consider hiding it.
  setTimeout(()=>{
    if(document.activeElement && document.activeElement.classList &&
       (document.activeElement.classList.contains("mini-weight-input") || document.activeElement.classList.contains("mini-reps-input") || document.activeElement.classList.contains("hms-input"))){
      return; // focus moved straight to another numeric field — keep the keypad open
    }
    hideNumKeypad();
  }, 120);
}
function showNumKeypad(kind){
  const bar = document.getElementById("numKeypad");
  if(!bar) return;
  bar.classList.add("visible");
  const label = document.getElementById("numKeypadLabel");
  const labelMap = {weight:"Weight", reps:"Reps", stretchH:"Hours", stretchM:"Minutes", stretchS:"Seconds"};
  if(label) label.textContent = labelMap[kind] || "";
  const dot = document.getElementById("numKeypadDot");
  if(dot) dot.style.visibility = kind === "weight" ? "visible" : "hidden";
}
function hideNumKeypad(){
  const bar = document.getElementById("numKeypad");
  if(bar) bar.classList.remove("visible");
  activeNumField = null;
}
function setStretchEditField(kind, val){
  const n = val === "" ? 0 : (parseInt(val, 10) || 0);
  if(kind === "stretchH") stretchEditH = n;
  else if(kind === "stretchM") stretchEditM = n;
  else if(kind === "stretchS") stretchEditS = n;
}
function numKeypadPress(ch){
  if(!activeNumField) return;
  const {idx, group, si, kind} = activeNumField;
  const el = document.getElementById(numFieldElId(idx, group, si, kind));
  if(!el) return;
  let cur = activeNumSelectAll ? "" : (el.value || "");
  activeNumSelectAll = false;
  if(ch === "back"){
    cur = cur.slice(0, -1);
  }else if(ch === "."){
    if(kind !== "weight" || cur.includes(".")) return;
    cur += ".";
  }else{
    cur += ch;
  }
  el.value = cur;
  if(kind === "weight") setSetWeight(idx, group, si, cur);
  else if(kind === "reps") setSetReps(idx, group, si, cur);
  else setStretchEditField(kind, cur);
}
function handleNumFieldTyped(el, idx, group, si, kind){
  // Defense-in-depth filter for any input that doesn't go through the
  // on-screen keypad (paste, a physical/bluetooth keyboard, autofill).
  const allowDecimal = kind === "weight";
  let v = el.value;
  v = allowDecimal ? v.replace(/[^0-9.]/g, "") : v.replace(/[^0-9]/g, "");
  if(allowDecimal){
    const firstDot = v.indexOf(".");
    if(firstDot !== -1) v = v.slice(0, firstDot+1) + v.slice(firstDot+1).replace(/\./g, "");
  }
  if(v !== el.value) el.value = v;
  activeNumSelectAll = false;
  if(kind === "weight") setSetWeight(idx, group, si, v);
  else if(kind === "reps") setSetReps(idx, group, si, v);
  else setStretchEditField(kind, v);
}
function toggleSetDone(idx, group, si, checked){
  sessionEntries[idx][group][si].done = checked;
  persistActiveSession();
  if(group === "sets"){
    // A full render (safe here since this is an onchange event, not a
    // mid-keystroke one) lets the card auto-collapse/expand as its
    // completed state changes, and keeps the header ratio in sync.
    render();
  }
}
function isEntryComplete(entry){
  return entry.sets.every(s => s.done && s.reps !== null && s.reps !== "");
}
function toggleExerciseCollapse(exId){
  if(expandedOverrides.has(exId)) expandedOverrides.delete(exId);
  else expandedOverrides.add(exId);
  persistActiveSession();
  render();
}
function addWarmup(idx){
  const entry = sessionEntries[idx];
  const baseWeight = entry.sets[0] ? entry.sets[0].weight : 0;
  const suggested = Math.round((baseWeight * 0.5) / 5) * 5;
  entry.warmups.push({ weight: suggested, reps: null, done:false });
  persistActiveSession();
  render();
}
function removeWarmup(idx, si){
  sessionEntries[idx].warmups.splice(si,1);
  persistActiveSession();
  render();
}
function updateStatusPreview(idx){
  const entry = sessionEntries[idx];
  const el = document.getElementById(`status-${idx}`);
  if(!el) return;
  const reps = entry.sets.map(s=>s.reps);
  const filled = entry.sets.every(s => s.done && s.reps !== null && s.reps !== "");
  if(filled){
    const status = computeStatus(reps.map(Number));
    el.className = `status-preview status-${status}`;
    el.innerHTML = `<span class="sw"></span>${STATUS_LABEL[status].text}`;
  }else{
    el.className = `status-preview status-neutral`;
    el.innerHTML = `<span class="sw"></span>Check off all 3 sets to see status`;
  }
}
function updateFinishButton(){
  const btn = document.getElementById("finishBtn");
  if(!btn) return;
  const hasEntries = sessionEntries.length > 0;
  const allFilled = hasEntries && sessionEntries.every(e => e.sets.every(s=>s.done && s.reps!==null && s.reps!==""));

let modalHistoryPushed = false;

/* ============ MODAL / SHEET SYSTEM ============
   Generic, highly reusable bottom-sheet + confirm-dialog machinery. Any
   modal must be opened by setting #modal-root's innerHTML and calling
   pushModalState() (so it consumes one History entry), and closed via
   closeModal() (never by clearing innerHTML directly) so a single Android
   back-press closes just the modal instead of leaving the page behind it. */
function pushModalState(){
  history.pushState({modal:true}, "", "");
  modalHistoryPushed = true;
}
function closeModal(){
  document.getElementById("modal-root").innerHTML = "";
  if(modalHistoryPushed){
    modalHistoryPushed = false;
    history.back();
  }
}

let _pendingConfirmAction = null;
function showConfirmDialog(message, onYes){
  _pendingConfirmAction = onYes;
  const modal = document.getElementById("modal-root");
  modal.innerHTML = `
    <div class="sheet-backdrop" onclick="if(event.target===this){_pendingConfirmAction=null; closeModal();}">
      <div class="sheet">
        <div class="sheet-handle"></div>
        <div class="sheet-title">Are You Sure?</div>
        <div class="confirm-msg">${message}</div>
        <div class="confirm-actions">
          <button class="confirm-btn" onclick="_pendingConfirmAction=null; closeModal();">No</button>
          <button class="confirm-btn confirm-btn-danger" onclick="runConfirmedAction()">Yes</button>
        </div>
      </div>
    </div>
  `;
  pushModalState();
}
function runConfirmedAction(){
  const fn = _pendingConfirmAction;
  _pendingConfirmAction = null;
  closeModal();
  if(fn) fn();
}

function saveSession(){
  if(sessionEntries.length === 0) return;
  const entries = sessionEntries.map(e=>{
    const setsClean = e.sets.map(s => ({
      weight: s.weight,
      reps: (s.reps===null || s.reps==="") ? null : Number(s.reps),
      done: !!s.done
    }));
    const warmupsClean = e.warmups.map(s => ({
      weight: s.weight,
      reps: (s.reps===null || s.reps==="") ? null : Number(s.reps),
      done: !!s.done
    }));
    const filled = setsClean.every(s => s.done && s.reps !== null);
    const volume = filled ? setsClean.reduce((sum,s)=> sum + s.weight*s.reps, 0) : 0;
    const status = filled ? computeStatus(setsClean.map(s=>s.reps)) : null;
    return { exId:e.exId, name:e.name, warmups:warmupsClean, sets:setsClean, volume, status };
  });
  const w = upsertWorkout(editingWorkoutId, sessionType, sessionDate, entries);
  const completed = workoutStatus(w) === "completed";
  if(completed && sessionStartTime && !isFuturePlan()){
    const now = sessionPausedAt || Date.now();
    w.duration = Math.floor((now - sessionStartTime)/1000);
    saveData(DATA);
  }
  sessionEntries = [];
  editingWorkoutId = null;
  sessionStartTime = null;
  sessionPausedAt = null;
  stretchStartTime = null;
  stretchPausedAt = null;
  stretchPhase = "idle";
  stretchStopView = "confirm";
  expandedOverrides = new Set();
  stopSessionTimer();
  stopStretchTimer();
  clearActiveSessionStorage();
  showToast(completed ? "Workout saved" : "Plan saved");
  nav({name:"home"});
}

function discardWorkout(){
  const savedWorkoutId = editingWorkoutId;
  const msg = savedWorkoutId
    ? "Discard this workout? This planned workout will be permanently deleted."
    : "Discard this workout? Everything entered in this session will be lost.";
  showConfirmDialog(msg, ()=>{
    if(savedWorkoutId){
      DATA.workouts = DATA.workouts.filter(w=>w.id!==savedWorkoutId);
      saveData(DATA);
    }
    sessionEntries = [];
    sessionType = null;
    sessionDate = todayStr();
    editingWorkoutId = null;
    sessionStartTime = null;
    sessionPausedAt = null;
    stretchStartTime = null;
    stretchPausedAt = null;
    stretchPhase = "idle";
  stretchStopView = "confirm";
    expandedOverrides = new Set();
    stopSessionTimer();
    stopStretchTimer();
    clearActiveSessionStorage();
    showToast("Workout discarded");
    navAfterModalClose({name:"home"});
  });
}
